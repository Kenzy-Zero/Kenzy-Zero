<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 268" width="1000" height="268" role="img" aria-label="whoami">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7d774"/>
      <stop offset="1" stop-color="#c98a1a"/>
    </linearGradient>
  </defs>

  <!-- section label -->
  <g font-family="'JetBrains Mono','Courier New',monospace">
    <rect x="0" y="6" width="44" height="28" rx="4" fill="none" stroke="url(#gold)" stroke-width="1.4"/>
    <text x="22" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#f0b429">01</text>
    <text x="58" y="26" font-family="'Segoe UI',system-ui,sans-serif" font-size="21" font-weight="700" letter-spacing="0.5" fill="#f0b429">whoami</text>
  </g>

  <!-- terminal window -->
  <rect x="0" y="52" width="1000" height="212" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1.2"/>
  <rect x="0" y="52" width="1000" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="72" width="1000" height="14" fill="#161b22"/>
  <circle cx="24" cy="69" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="69" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="69" r="6" fill="#27c93f"/>
  <text x="500" y="73" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="12.5" fill="#6e7681">kenzy@zero: ~</text>

  <g font-family="'JetBrains Mono','Courier New',monospace" font-size="14.5">
    <text x="26" y="118"><tspan fill="#f0b429">$</tspan> <tspan fill="#c9d1d9">whoami</tspan></text>
    <text x="26" y="146" fill="#e6edf3" font-weight="700">kenzy-zero  —  open-source builder</text>

    <text x="26" y="180" fill="#8b949e"><tspan fill="#f0b429">»</tspan> I ship lean developer tools: data prep that doesn't crash,</text>
    <text x="45" y="200" fill="#8b949e">formats ready to query on open, docs built for the AI era.</text>
    <text x="26" y="224" fill="#8b949e"><tspan fill="#f0b429">»</tspan> focus: data tooling · dev tooling · AI-native infrastructure</text>

    <text x="26" y="252"><tspan fill="#f0b429">$</tspan> <tspan fill="#c9d1d9">_</tspan></text>
    <rect x="42" y="242" width="9" height="15" fill="#f0b429">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
